<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Request Admin Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0e0f13;
            font-family:Arial,Helvetica,sans-serif;
            display:flex; justify-content:center; align-items:center;
            height:100vh; color:#fff;
        }
        .card {
            width:400px; background:#16181f;
            border:1px solid #252830; border-radius:14px; padding:28px;
        }
        h2 { margin-bottom:8px; }
        p { color:#999; margin-bottom:25px; font-size:14px; }
        input {
            width:100%; padding:12px; margin-bottom:14px;
            border-radius:8px; border:1px solid #333;
            background:#1d1f28; color:white; font-size:15px;
        }
        input:focus { outline:none; border-color:#3de89a; }
        button {
            width:100%; padding:12px; border:none; border-radius:8px;
            cursor:pointer; font-size:15px; font-weight:bold; margin-top:5px;
        }
        .primary { background:#3de89a; color:#000; }
        .primary:disabled { opacity:.5; cursor:not-allowed; }
        .secondary { margin-top:12px; background:#333; color:white; }
        .msg { margin-top:15px; text-align:center; font-size:14px; }
        .success { color:#3de89a; }
        .error { color:#ff6b6b; }
        .spinner {
            display:inline-block; width:14px; height:14px;
            border:2px solid #000; border-top-color:transparent;
            border-radius:50%; animation:spin .6s linear infinite;
            vertical-align:middle; margin-right:6px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h2>Request Admin Access</h2>
    <p>Your request will be reviewed by the Super Admin.<br>They will be notified instantly on Telegram.</p>

    <input id="username" placeholder="Username" autocomplete="off" autocapitalize="off"/>
    <input id="password" type="password" placeholder="Password"/>
    <input id="confirm"  type="password" placeholder="Confirm Password"/>

    <button class="primary" id="submit-btn" onclick="submitRequest()">Submit Request</button>
    <button class="secondary" onclick="location.href='index.html'">Back</button>

    <div id="msg" class="msg"></div>
</div>

<script>
    // ── Supabase ──────────────────────────────────────────────────────
    const SUPABASE_URL      = 'https://xvtbmxtstejldgsjzdft.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2dGJteHRzdGVqbGRnc2p6ZGZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzM1NzAsImV4cCI6MjA5NzI0OTU3MH0.ointE-k7Few1JKkZNaCjwLZSePKII1sWyn_KaznTF_8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Telegram config — fill these in ──────────────────────────────
    const TELEGRAM_BOT_TOKEN = '8650923942:AAH2ZU6zHXygP6W4sqbKMlKcgaziGnZ61SA';   // from @BotFather
    const TELEGRAM_CHAT_ID   = '2018589600';     // your personal chat ID

    async function sendTelegramNotification(username) {
        // Skip silently if not configured yet
        if (TELEGRAM_BOT_TOKEN === '8650923942:AAH2ZU6zHXygP6W4sqbKMlKcgaziGnZ61SA') return;

        const text =
            `🔔 *New Admin Request*\n\n` +
            `👤 Username: \`${username}\`\n` +
            `🕐 Time: ${new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}\n\n` +
            `Open the app → Approvals tab to approve or reject.`;

        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id:    TELEGRAM_CHAT_ID,
                    text:       text,
                    parse_mode: 'Markdown'
                })
            });
        } catch (e) {
            // Notification failed silently — request is still saved
            console.warn('Telegram notify failed:', e);
        }
    }

    async function submitRequest() {
        const username = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;
        const msg      = document.getElementById('msg');
        const btn      = document.getElementById('submit-btn');

        msg.className = 'msg';
        msg.innerHTML = '';

        if (!username || !password) {
            msg.classList.add('error');
            msg.innerHTML = 'Please fill all fields.';
            return;
        }

        if (username.length < 2) {
            msg.classList.add('error');
            msg.innerHTML = 'Username too short.';
            return;
        }

        if (password.length < 4) {
            msg.classList.add('error');
            msg.innerHTML = 'Password must be at least 4 characters.';
            return;
        }

        if (password !== confirm) {
            msg.classList.add('error');
            msg.innerHTML = 'Passwords do not match.';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Submitting…';

        // Already an admin?
        const { data: admin } = await sb
            .from('admins')
            .select('id')
            .eq('username', username)
            .maybeSingle();

        if (admin) {
            showError(btn, msg, 'Username already exists as an admin.');
            return;
        }

        // Already has a pending request?
        const { data: req } = await sb
            .from('admin_requests')
            .select('id')
            .eq('username', username)
            .eq('status', 'pending')
            .maybeSingle();

        if (req) {
            showError(btn, msg, 'A request for this username is already pending.');
            return;
        }

        // Insert the request
        const { error } = await sb
            .from('admin_requests')
            .insert({ username, password, status: 'pending' });

        if (error) {
            showError(btn, msg, error.message);
            return;
        }

        // Fire Telegram notification (non-blocking)
        sendTelegramNotification(username);

        // Success
        btn.disabled = false;
        btn.innerHTML = 'Submit Request';
        msg.classList.add('success');
        msg.innerHTML = '✅ Request submitted! The super admin has been notified.<br/>You\'ll get access once approved.';

        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('confirm').value  = '';
    }

    function showError(btn, msg, text) {
        btn.disabled = false;
        btn.innerHTML = 'Submit Request';
        msg.classList.add('error');
        msg.innerHTML = text;
    }
</script>
</body>
</html>
