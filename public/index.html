<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f13; --surface: #16181f; --surface2: #1d1f28;
    --border: #252830; --text: #e8eaf0; --muted: #60657a;
    --green: #3de89a; --red: #f0654a; --blue: #7b8cde; --yellow: #f5c842;
    --mono: 'Space Mono', monospace; --sans: 'Space Grotesk', system-ui, sans-serif;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: block; }

  #auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 32px; width:100%; max-width:380px; }
  .auth-logo { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .auth-title { font-size:26px; font-weight:700; margin-bottom:6px; }
  .auth-sub { font-size:13px; color:var(--muted); margin-bottom:32px; line-height:1.5; }
  .auth-label { display:block; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .auth-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--sans); font-size:16px; padding:14px 16px; outline:none; transition:border-color .15s; margin-bottom:12px; }
  .auth-input:focus { border-color:var(--green); }
  .auth-btn { width:100%; background:var(--green); color:var(--bg); border:none; border-radius:10px; padding:14px; font-family:var(--sans); font-weight:700; font-size:15px; cursor:pointer; transition:opacity .15s; }
  .auth-btn:hover { opacity:.88; }
  .auth-btn:disabled { opacity:.4; cursor:not-allowed; }
  .auth-error { color:var(--red); font-size:12px; margin-top:10px; text-align:center; min-height:18px; }
  .auth-hint { color:var(--muted); font-size:11px; text-align:center; margin-top:16px; line-height:1.6; }

  /* admin password step */
  .admin-pass-box { margin-top:16px; }
  .admin-pass-box input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--sans); font-size:16px; padding:14px 16px; outline:none; margin-bottom:10px; }
  .admin-pass-box input:focus { border-color:var(--blue); }

  .users-online { margin-top:20px; }
  .users-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .user-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .user-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--muted); cursor:pointer; transition:all .15s; }
  .user-chip:hover { border-color:var(--green); color:var(--green); }

  #app-screen { display:none; min-height:100vh; flex-direction:column; }
  #app-screen.visible { display:flex; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; flex-shrink:0; }
  .app-name { font-size:15px; font-weight:700; }
  .app-sub { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }
  .topbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .user-badge { background:var(--green); color:var(--bg); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; }
  .btn-sm { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:var(--sans); font-size:12px; padding:6px 12px; cursor:pointer; transition:all .15s; }
  .btn-sm:hover { border-color:var(--green); color:var(--green); }
  .btn-out { border-color:var(--red) !important; color:var(--red) !important; }
  .btn-out:hover { background:var(--red) !important; color:#fff !important; }

  .tabs-wrap { border-bottom:1px solid var(--border); flex-shrink:0; }
  .tabs { display:flex; gap:4px; padding:12px 20px 0; overflow-x:auto; max-width:960px; margin:0 auto; }
  .tab-btn { padding:8px 16px; border-radius:8px 8px 0 0; border:none; cursor:pointer; font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:.05em; background:transparent; color:var(--muted); border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; }
  .tab-btn.active { color:var(--green); border-bottom-color:var(--green); }

  .content { max-width:960px; margin:0 auto; padding:20px 16px 60px; flex:1; width:100%; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:14px; }
  .card-green { border-top:3px solid var(--green); }
  .card-red { border-top:3px solid var(--red); }
  .card-blue { border-top:3px solid var(--blue); }
  .card-yellow { border-top:3px solid var(--yellow); }
  .sec-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .kpi-val { font-family:var(--mono); font-size:28px; font-weight:700; letter-spacing:-1px; }
  .kpi-sub { font-size:11px; color:var(--muted); margin-top:3px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:500px) { .grid2 { grid-template-columns:1fr; } }

  .form-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; align-items:flex-end; }
  .f { flex:1; min-width:110px; }
  .f label { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  input[type=text],input[type=number],input[type=date],input[type=month],input[type=password] { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--sans); font-size:13px; padding:9px 12px; outline:none; width:100%; transition:border-color .15s; }
  input:focus { border-color:var(--blue); }
  .btn-add { border:none; border-radius:8px; padding:9px 18px; font-family:var(--sans); font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
  .btn-green { background:var(--green); color:var(--bg); }
  .btn-red { background:var(--red); color:#fff; }
  .btn-blue { background:var(--blue); color:#fff; }
  .btn-yellow { background:var(--yellow); color:var(--bg); }

  .data-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .data-row:last-child { border-bottom:none; }
  .d-date { font-family:var(--mono); font-size:10px; color:var(--muted); width:82px; flex-shrink:0; }
  .d-name { flex:1; font-weight:500; }
  .d-note { color:var(--muted); font-size:11px; flex:1; }
  .pill { border-radius:20px; padding:2px 10px; font-size:10px; font-family:var(--mono); font-weight:700; white-space:nowrap; }
  .p-green { background:#3de89a22; color:var(--green); }
  .p-red { background:#f0654a22; color:var(--red); }
  .p-blue { background:#7b8cde22; color:var(--blue); }
  .p-yellow { background:#f5c84222; color:var(--yellow); }
  .del { background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:10px; padding:2px 7px; cursor:pointer; flex-shrink:0; }
  .del:hover { border-color:var(--red); color:var(--red); }

  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .bar-lbl { font-family:var(--mono); font-size:10px; color:var(--muted); width:40px; flex-shrink:0; }
  .bar-track { flex:1; height:14px; background:var(--surface2); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; }
  .bar-amt { font-family:var(--mono); font-size:10px; color:var(--muted); width:54px; text-align:right; }

  .net-row { display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px dashed var(--border); font-size:13px; }
  .net-row:last-child { border-bottom:none; }
  .net-final { display:flex; justify-content:space-between; align-items:baseline; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }

  .user-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .user-row:last-child { border-bottom:none; }
  .user-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; color:var(--bg); }
  .user-info { flex:1; }
  .user-name { font-weight:600; font-size:14px; }
  .user-meta-text { font-size:11px; color:var(--muted); margin-top:2px; }
  .user-stats { text-align:right; }
  .user-stat-val { font-family:var(--mono); font-size:13px; color:var(--green); font-weight:700; }
  .user-stat-lbl { font-size:10px; color:var(--muted); }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:var(--bg); border-radius:8px; padding:10px 22px; font-weight:700; font-size:13px; z-index:999; box-shadow:0 4px 20px #0008; transition:transform .25s ease; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.err { background:var(--red); color:#fff; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Family Finance</div>
    <div class="auth-title">Credits Tracker</div>
    <div class="auth-sub">Enter your username to load your data.<br/>New username = new account, automatically.</div>

    <!-- Step 1: username -->
    <div id="step-username">
      <label class="auth-label">Your Username</label>
      <input class="auth-input" type="text" id="username-input"
        placeholder="e.g. bhanu, dad, prakash"
        onkeydown="if(event.key==='Enter') enterApp()"
        autocomplete="off" autocapitalize="off" />
      <button class="auth-btn" id="enter-btn" onclick="enterApp()">Enter →</button>
    </div>

    <!-- Step 2: admin password (hidden by default) -->
    <div id="step-adminpass" style="display:none">
      <label class="auth-label">Admin Password</label>
      <div class="admin-pass-box">
        <input type="password" id="admin-pass-input"
          placeholder="Enter admin password"
          onkeydown="if(event.key==='Enter') submitAdminPass()" />
        <button class="auth-btn" id="admin-pass-btn" onclick="submitAdminPass()">Unlock Admin →</button>
      </div>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="users-online" id="users-online" style="display:none">
      <div class="users-label">Recent logins</div>
      <div class="user-chips" id="user-chips"></div>
    </div>
    <div class="auth-hint">No password needed. Just remember your username.<br/>Each username has its own private data.</div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div>
      <div class="app-sub">Family Finance</div>
      <div class="app-name">Credits Tracker</div>
    </div>
    <div class="topbar-right">
      <div class="user-badge" id="user-badge">—</div>
      <button class="btn-sm" onclick="downloadCSV()">⬇ CSV</button>
      <button class="btn-sm btn-out" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard',this)">Dashboard</button>
      <button class="tab-btn" onclick="switchTab('credits',this)">Credits</button>
      <button class="tab-btn" onclick="switchTab('disbursements',this)">Disbursements</button>
      <button class="tab-btn" onclick="switchTab('bills',this)">Bills</button>
      <button class="tab-btn" onclick="switchTab('cc',this)">CC &amp; Inflows</button>
      <button class="tab-btn" id="admin-tab-btn" style="display:none" onclick="switchTab('admin',this)">Admin</button>
      <button class="tab-btn" id="approval-tab-btn" style="display:none" onclick="switchTab('approvals',this)">
    Approvals
</button>
    </div>
  </div>

  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-credits" style="display:none"></div>
    <div id="tab-disbursements" style="display:none"></div>
    <div id="tab-bills" style="display:none"></div>
    <div id="tab-cc" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
    <div id="tab-approvals" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL      = 'https://xvtbmxtstejldgsjzdft.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2dGJteHRzdGVqbGRnc2p6ZGZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzM1NzAsImV4cCI6MjA5NzI0OTU3MH0.ointE-k7Few1JKkZNaCjwLZSePKII1sWyn_KaznTF_8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let USERNAME   = null;
// let IS_ADMIN   = false;
let USER_ROLE = "user";
let VIEWING_USER = null;
let STATE      = { credits:[], disbursements:[], bills:[], ccBills:[], inflows:[], sliceBalance:0 };
let currentTab = 'dashboard';

const fmt  = n => n>=100000?`₹${(n/100000).toFixed(2)}L`:n>=1000?`₹${(n/1000).toFixed(1)}K`:`₹${Number(n).toLocaleString('en-IN')}`;
const fmtF = n => `₹${Math.abs(n).toLocaleString('en-IN')}`;
const today = () => new Date().toISOString().split('T')[0];
const monthLbl = m => { const [y,mo]=m.split('-'); return new Date(+y,+mo-1).toLocaleString('default',{month:'short',year:'2-digit'}); };

function toast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'err' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Quick login chips ─────────────────────────
function loadKnownUsers() {
  try { return JSON.parse(localStorage.getItem('ct_known_users') || '[]'); } catch { return []; }
}
function saveKnownUser(u) {
  const list = loadKnownUsers();
  if (!list.includes(u)) { list.unshift(u); localStorage.setItem('ct_known_users', JSON.stringify(list.slice(0,5))); }
}
function renderUserChips() {
  const users = loadKnownUsers();
  if (!users.length) return;
  document.getElementById('users-online').style.display = '';
  document.getElementById('user-chips').innerHTML = users.map(u =>
    `<div class="user-chip" onclick="quickLogin('${u}')">${u}</div>`).join('');
}
function quickLogin(u) {
  document.getElementById('username-input').value = u;
  enterApp();
}

// ── STEP 1: Enter username ────────────────────
async function enterApp() {
  const raw = document.getElementById('username-input').value.trim().toLowerCase();

  if (!raw) {
    document.getElementById('auth-error').textContent = 'Please enter a username';
    return;
  }

  if (raw.length < 2) {
    document.getElementById('auth-error').textContent = 'Username too short';
    return;
  }

  const btn = document.getElementById('enter-btn');
  btn.disabled = true;
  btn.textContent = 'Checking...';

  document.getElementById('auth-error').textContent = '';

  const { data } = await sb
      .from('admins')
      .select('username,role')
      .eq('username', raw)
      .maybeSingle();

  if (data) {

      USERNAME = raw;
      USER_ROLE = data.role;

      document.getElementById('step-username').style.display = 'none';
      document.getElementById('step-adminpass').style.display = '';
      document.getElementById('admin-pass-input').focus();

  } else {

      USERNAME = raw;
      USER_ROLE = "user";

      saveKnownUser(raw);
      await trackLogin(raw);
      await loadAll();
      launchApp();

  }

  btn.disabled = false;
  btn.textContent = 'Enter →';
}

// ── STEP 2: Admin password ────────────────────
async function submitAdminPass() {

  const pass = document.getElementById('admin-pass-input').value;

  if (!pass) return;

  const btn = document.getElementById('admin-pass-btn');

  btn.disabled = true;
  btn.textContent = 'Checking...';

  document.getElementById('auth-error').textContent = '';

  const { data } = await sb
      .from('admins')
      .select('password,role')
      .eq('username', USERNAME)
      .single();

  if (data && pass === data.password) {

      USER_ROLE = data.role;

      saveKnownUser(USERNAME);

      await trackLogin(USERNAME);

      await loadAll();

      launchApp();

  } else {

      document.getElementById('auth-error').textContent = 'Wrong password';

  }

  btn.disabled = false;
  btn.textContent = 'Unlock Admin →';
}

// ── Launch app after auth ─────────────────────
function launchApp() {
  let badge = USERNAME;

if (USER_ROLE === "super_admin") {
    badge = "👑 " + USERNAME;
} else if (USER_ROLE === "admin") {
    badge = "🛡️ " + USERNAME;
}

document.getElementById('user-badge').textContent = badge;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').className = 'visible';
  // Show admin tab only for admin
  document.getElementById('admin-tab-btn').style.display =
(USER_ROLE === 'admin' || USER_ROLE === 'super_admin')
? ''
: 'none';
  renderDashboard();
document.getElementById('approval-tab-btn').style.display =
USER_ROLE === 'super_admin'
? ''
: 'none';
updateApprovalBadge();
}

function logout() {
  USERNAME = null; USER_ROLE = "user";
  STATE = { credits:[], disbursements:[], bills:[], ccBills:[], inflows:[], sliceBalance:0 };
  document.getElementById('username-input').value = '';
  document.getElementById('admin-pass-input').value = '';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('step-username').style.display = '';
  document.getElementById('step-adminpass').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').className = '';
  // reset tabs
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn').classList.add('active');
  TABS.forEach(t => document.getElementById('tab-'+t).style.display = t==='dashboard'?'':'none');
  currentTab = 'dashboard';
  renderUserChips();
}

// ── Track login ───────────────────────────────
async function trackLogin(username) {

    const { data: admin } = await sb
        .from("admins")
        .select("role")
        .eq("username", username)
        .maybeSingle();

    const role = admin?.role || "user";

    const { data } = await sb
        .from("app_users")
        .select("login_count")
        .eq("username", username)
        .single();

    const count = (data?.login_count || 0) + 1;

    await sb
        .from("app_users")
        .upsert({
            username,
            role,
            login_count: count,
            last_login: new Date().toISOString()
        });
}

// ── DB ────────────────────────────────────────
const uid = () => VIEWING_USER || USERNAME;

async function loadAll() {
  const [c, d, b, cc, inf, meta] = await Promise.all([
    sb.from('credits').select('*').eq('user_id', uid()).order('date'),
    sb.from('disbursements').select('*').eq('user_id', uid()).order('date'),
    sb.from('bills').select('*').eq('user_id', uid()).order('month'),
    sb.from('cc_bills').select('*').eq('user_id', uid()),
    sb.from('inflows').select('*').eq('user_id', uid()),
    sb.from('user_meta').select('*').eq('user_id', uid()),
  ]);
  STATE.credits       = c.data || [];
  STATE.disbursements = d.data || [];
  STATE.bills         = b.data || [];
  STATE.ccBills       = cc.data || [];
  STATE.inflows       = inf.data || [];
  STATE.sliceBalance  = meta.data?.[0]?.slice_balance || 0;
}

// ── Tabs ──────────────────────────────────────
const TABS = ['dashboard','credits','disbursements','bills','cc','admin','approvals'];
function switchTab(name, btn) {
  TABS.forEach(t => document.getElementById('tab-'+t).style.display = t===name?'':'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = name;
  renderTab(name);
}
function renderTab(n) {
  if(n==='dashboard')     renderDashboard();
  if(n==='credits')       renderCredits();
  if(n==='disbursements') renderDisbursements();
  if(n==='bills')         renderBills();
  if(n==='cc')            renderCC();
  if(n==='admin')         renderAdmin();
  if(n==='approvals') renderApprovals();
}

// ── DASHBOARD ─────────────────────────────────
function renderDashboard() {
  const tC  = STATE.credits.reduce((s,c)=>s+ +c.amount,0);
  const tD  = STATE.disbursements.reduce((s,d)=>s+ +d.amount,0);
  const tCC = STATE.ccBills.reduce((s,c)=>s+ +c.amount,0);
  const tI  = STATE.inflows.reduce((s,i)=>s+ +i.amount,0);
  const rem = tC - tD;
  const net = STATE.sliceBalance + tI - tCC;
  const debt = rem - net;

  const monthly = {};
  STATE.credits.forEach(c => { const m=c.date.slice(0,7); monthly[m]=(monthly[m]||0)+ +c.amount; });
  const months = Object.entries(monthly).sort(([a],[b])=>a.localeCompare(b));
  const maxM = Math.max(...months.map(([,v])=>v), 1);

  document.getElementById('tab-dashboard').innerHTML = `
    ${USER_ROLE==="super_admin" && VIEWING_USER ? `
    <div class="card card-blue" style="margin-bottom:14px">

      <div class="sec-label">Net Position</div>

function kpi(label, value, color, sub) {
  return `<div class="card" style="border-top:3px solid ${color}">
    <div class="sec-label">${label}</div>
    <div class="kpi-val" style="color:${color}">${value}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

  STATE.bills.push(data); renderBills(); renderDashboard(); toast('Bill saved ✓');

// ── DELETE ────────────────────────────────────
async function del(table, id) {
  await sb.from(table).delete().eq('id', id);
  if(table==='credits')       STATE.credits       = STATE.credits.filter(r=>r.id!=id);
  if(table==='disbursements') STATE.disbursements = STATE.disbursements.filter(r=>r.id!=id);
  if(table==='bills')         STATE.bills         = STATE.bills.filter(r=>r.id!=id);
  if(table==='cc_bills')      STATE.ccBills       = STATE.ccBills.filter(r=>r.id!=id);
  if(table==='inflows')       STATE.inflows       = STATE.inflows.filter(r=>r.id!=id);
  renderTab(currentTab); renderDashboard(); toast('Deleted');
}

    const {data:requests,error}=await sb

        ${

            <div class="user-info">

                <div class="user-name">

                    ${r.username}

                <div class="user-meta-text">

                    ${new Date(r.requested_at).toLocaleString()}

async function approveAdmin(id){

    const {data:req,error}=await sb
        .from("admin_requests")
        .select("*")
        .eq("id",id)
        .single();

    if(error){
        toast(error.message,true);
        return;
    }

    const {data:exists}=await sb
        .from("admins")
        .select("id")
        .eq("username",req.username)
        .maybeSingle();

    if(exists){
        toast("Already an admin",true);
        return;
    }

    const {error:insertError}=await sb
        .from("admins")
        .insert({
            username:req.username,
            password:req.password,
            role:"admin"
        });

    if(insertError){
        toast(insertError.message,true);
        return;
    }

    await sb
        .from("admin_requests")
        .update({
            status:"approved",
            approved_by:USERNAME,
            approved_at:new Date().toISOString()
        })
        .eq("id",id);

    renderApprovals();
    updateApprovalBadge();

    toast("Admin Approved");
}
async function rejectAdmin(id){

    await sb
        .from("admin_requests")
        .update({
            status:"rejected",
            approved_by:USERNAME,
            approved_at:new Date().toISOString()
        })
        .eq("id",id);

    renderApprovals();
    updateApprovalBadge();

    toast("Request Rejected");
}
function isViewingOtherUser() {
    return USER_ROLE === "super_admin" && VIEWING_USER;
}
async function updateApprovalBadge(){

    if(USER_ROLE !== "super_admin") return;

    const {count,error} = await sb
        .from("admin_requests")
        .select("*",{count:"exact",head:true})
        .eq("status","pending");

    if(error) return;

    const btn = document.getElementById("approval-tab-btn");

    btn.innerHTML =
        count > 0
        ? `Approvals 🔴 (${count})`
        : "Approvals";
}

// ── CSV ───────────────────────────────────────
function downloadCSV() {
  const rows = [['Type','Date/Month','Name','Amount','Note']];
  STATE.credits.forEach(c => rows.push(['Credit', c.date, '', c.amount, c.note||'']));
  STATE.disbursements.forEach(d => rows.push(['Disbursement', d.date, d.name, d.amount, d.note||'']));
  STATE.bills.forEach(b => {
    const extras = JSON.parse(b.other_bills||'[]');
    rows.push(['Bill-Current', b.month, '', b.current_bill, '']);
    extras.forEach(e => rows.push(['Bill-Extra', b.month, '', e.amount, e.label]));
  });
  STATE.ccBills.forEach(c => rows.push(['CC Bill', '', c.name, c.amount, '']));
  STATE.inflows.forEach(i => rows.push(['Inflow', '', i.name, i.amount, '']));
  rows.push(['Slice Balance', '', '', STATE.sliceBalance, '']);
  const csv = rows.map(r => r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `credits-${USERNAME}-${today()}.csv`;
  a.click();
  toast('Downloaded ✓');
}
